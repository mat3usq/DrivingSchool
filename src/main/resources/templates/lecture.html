                    <div class="container" th:each="lecture : ${lectureList}">
                        <div class="container-lecture">
                            <p class="title" th:text="${lecture.name}"></p>
                            <p
                                    class="content"
                                    th:unless="${lecture.content == null or lecture.content.isEmpty()}"
                                    th:text="${lecture.content}"></p>
                        </div>

                        <div class="container-sublecture">
                            <div class="sublecture-details" th:each="sublecture : ${lecture.getSublectures()}">
                                <h4 th:text="${sublecture.title}"></h4>
                                <p th:text="${sublecture.content}"></p>

                                <div class="subject-details" th:each="subject : ${sublecture.getSubjects()}">
                                    <p th:text="${subject.title}"></p>
                                    <p th:text="${subject.content}"></p>
                                    <div class="img-block">
                                        <img th:if="${subject.image}" th:src="${subject.getImageBase64()}" th:alt="${subject.title}"/>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <form name="lecture" th:action="@{/lecture/addLecture}" method="post" th:object="${newLecture}" enctype="multipart/form-data" class="lectureForm">

                        <p class="formTitle">Dodawanie Wykładu</p>

                        <div class="input-field">
                            <i class="fas fa-align-left"></i>

                        </div>

                        <div class="box-btn">
                            <button type="button" class="other-btn" onclick="addSublectureForm()">Dodaj Podwykład
                            </button>
                            <button type="submit" class="main-btn">Dodaj Wyklad</button>
                        </div>
                    </form>

<script>
    let sublectureIndex = 0
    let subjectCounters = []

    function addSublectureForm() {
        if (sublectureIndex < 10) {
            const container = document.getElementById('sublecturesContainer')
            subjectCounters[sublectureIndex] = 0

            const htmlContent = `
        <div id="sublecture-${sublectureIndex}">
            <p class="formTitle">Dodawanie ${sublectureIndex + 1}. Podwykładu</p>
            <div class="input-field">
                <i class="fas fa-book"></i>
                <input type="text" name="sublectures[${sublectureIndex}].title" placeholder="Nazwa Podwykładu">
            </div>
            <div class="input-field">
                <i class="fas fa-align-left"></i>
                <textarea name="sublectures[${sublectureIndex}].content" placeholder="Treść Podwykładu" rows="4"></textarea>
            </div>
            <div class="box-btn" id="btn-container-${sublectureIndex}">
                <button type="button" class="other-btn" onclick="addSubjectForm(${sublectureIndex})">Dodaj Rozdział</button>
            </div>
        </div>
        `
            container.insertAdjacentHTML('beforeend', htmlContent)
            sublectureIndex++
        }
    }

    function addSubjectForm(sublectureId) {
        if (subjectCounters[sublectureId] < 10) {
            const btnContainer = document.getElementById(`btn-container-${sublectureId}`);
            const subjectIndex = subjectCounters[sublectureId];
            const htmlContent = `
            <div class="subject-form">
                <p class="formTitle">Dodawanie ${subjectIndex + 1}. Rozdziału</p>
                <div class="input-field">
                    <i class="fas fa-book"></i>
                    <input type="text" name="sublectures[${sublectureId}].subjects[${subjectIndex}].title" placeholder="Nazwa Rozdziału">
                </div>
                <div class="input-field">
                    <i class="fas fa-align-left"></i>
                    <textarea name="sublectures[${sublectureId}].subjects[${subjectIndex}].content" placeholder="Treść Rozdziału" rows="4"></textarea>
                </div>
                <input type="file" name="sublectures[${sublectureId}].subjects[${subjectIndex}].file" accept="image/*">
            </div>
        `;
            btnContainer.insertAdjacentHTML('beforebegin', htmlContent);
            subjectCounters[sublectureId]++;
        }
    }

</script>
